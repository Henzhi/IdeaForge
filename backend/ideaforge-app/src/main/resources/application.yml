spring:
  application:
    name: ideaforge
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mandatory-file-encoding: UTF-8

  # ===== 数据源 =====
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ideaforge}?charSet=UTF-8
    username: ${POSTGRES_USER:ideaforge}
    password: ${POSTGRES_PASSWORD:ideaforge}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # ===== MyBatis-Plus =====
  # (JPA 配置已移除,改用 MyBatis-Plus)
  mybatis-plus:
    type-handlers-package: com.ideaforge.common.config  # 扫描 TimestampTzTypeHandler
    configuration:
      map-underscore-to-camel-case: true   # user_id → userId 自动驼峰映射
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # dev 打印 SQL
    global-config:
      db-config:
        logic-delete-field: deletedAt      # 软删除字段(此处仅声明,实际用 deleted_at 手动判断)
        logic-not-delete-value: 'null'

  # ===== Flyway 迁移 =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true     # 已有库时基线化,不报错

  # ===== Redis =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}           # 6380避开VMware vmnat占用6379
      password: ${REDIS_PASSWORD:}
      timeout: 5s

  # ===== RabbitMQ =====
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:ideaforge}
    password: ${RABBITMQ_PASSWORD:ideaforge}
    listener:
      simple:
        acknowledge-mode: auto

# ===== Sa-Token =====
sa-token:
  token-name: satoken
  timeout: 2592000                # 30 天
  active-timeout: 1800            # 30 分钟无操作过期
  is-concurrent: true             # 允许多端登录
  is-share: true                  # 多端共享同一 token
  token-style: uuid
  is-log: false

# ===== Servlet 编码(Windows 必须强制 UTF-8) =====
server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# ===== Actuator =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ===== 应用自定义配置 =====
app:
  aes-master-key: ${APP_AES_MASTER_KEY:dev-only-key-change-in-prod}
  # LLM 配置(OpenAI 兼容接口)。留空则不加载 LLM Bean,生成接口会返回未配置错误。
  # DeepSeek: base-url=https://api.deepseek.com  model-name=deepseek-chat
  # Qwen:     base-url=https://dashscope.aliyuncs.com/compatible-mode/v1  model-name=qwen-plus
  # OpenAI:   base-url=https://api.openai.com/v1  model-name=gpt-4o-mini
  llm:
    api-key: ${LLM_API_KEY:}
    base-url: ${LLM_BASE_URL:https://api.deepseek.com}
    model-name: ${LLM_MODEL_NAME:deepseek-chat}
    temperature: ${LLM_TEMPERATURE:0.8}
    max-tokens: ${LLM_MAX_TOKENS:2000}
    timeout: ${LLM_TIMEOUT:60}

# ===== dev profile 专属 =====
---
spring:
  config:
    activate:
      on-profile: dev
# MyBatis-Plus dev 配置(SQL 日志已在主配置开启)

---
spring:
  config:
    activate:
      on-profile: prod
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl  # prod 关闭 SQL 日志
logging:
  level:
    root: WARN
    com.ideaforge: INFO
